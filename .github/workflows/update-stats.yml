name: Update README stats

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run generate
        env:
          GITHUB_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
          GH_USERNAME: sontixyou

      - name: Create Pull Request if changed
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          commit-message: "chore: refresh stats SVGs"
          title: "chore: refresh stats SVGs"
          body: |
            Automated update of README stats SVGs.
          branch: chore/update-stats
          delete-branch: true
          add-paths: |
            assets/stats.svg
            assets/top-langs.svg
